name: Deploy AWS (main)

# Legacy single-environment deploy when only one bucket is configured on main.
# Prefer deploy-test / deploy-uat / deploy-prod for isolated environments.

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: ${{ secrets.AWS_ROLE_ARN != '' && secrets.AWS_S3_BUCKET != '' }}
    uses: ./.github/workflows/reusable-deploy-aws.yml
    with:
      environment: production
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
